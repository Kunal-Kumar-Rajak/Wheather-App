<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wheather App</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="./img/clear.png" />
  </head>
  <body>
    <div class="card">
      <div class="search">
        <input type="text" placeholder="Enter city name..." />
        <button>
          <img src="./img/search.png" alt="">
          <i class="fas fa-search"></i> <!-- Font Awesome Search Icon -->
        </button>
      </div>
      <div class="error">
        <p>Invalid city name.</p>
      </div>
      <div class="weather">
        <img src="./img/rain.png" class="weather-icon" alt="" />
        <h1 class="temp">22°C</h1>
        <h2 class="city">Khagaria</h2>
        <div class="weather-description">
          <p class="description">Clear Sky</p>
        </div>
        <div class="details">
          <div class="col">
            <img src="./img/humidity.png" alt="" />
            <div>
              <p class="humidity">50%</p>
              <p>Humidity</p>
            </div>
          </div>
          <div class="col">
            <img src="./img/wind.png" alt="" />
            <div>
              <p class="wind">15 km/h</p>
              <p>Wind Speed</p>
            </div>
          </div>
          <div class="col">
            <img src="./img/pressure.png" alt="" />
            <div>
              <p class="pressure">1015 hPa</p>
              <p>Pressure</p>
            </div>
          </div>
        </div>
        <div class="temperature-range">
          <p>Min Temp: <span class="min-temp">18°C</span></p>
          <p>Max Temp: <span class="max-temp">26°C</span></p>
        </div>
        <div class="sunrise-sunset">
          <p>Sunrise: <span class="sunrise-time">06:00 AM</span></p>
          <p>Sunset: <span class="sunset-time">07:30 PM</span></p>
        </div>
    
        <!-- Yesterday's Weather -->
        <div class="yesterday-weather">
          <h3>Yesterday's Weather</h3>
          <p class="yesterday-temp">Temperature: 20°C</p>
          <p class="yesterday-description">Description: Clear Sky</p>
        </div>
    
        <!-- Tomorrow's Weather -->
        <div class="tomorrow-weather">
          <h3>Tomorrow's Weather</h3>
          <p class="tomorrow-temp">Temperature: 25°C</p>
          <p class="tomorrow-description">Description: Light Rain</p>
        </div>
      </div>
    </div>
    
    <script src="./script.js"></script>
  </body>
</html>
